<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipping Details - Aotearoa Adventure Gear</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/custom-style.css" rel="stylesheet">
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/product-data.js"></script>
    <script src="js/shoppingcart.js"></script>
    <style>
        body { font-family: 'Open Sans', sans-serif; color: #777; background-color: #ffffff; }
        
        /* Step Process Navigation Styles */
        .step-link { color: #b0b0b0 !important; font-size: 1.2rem; font-weight: 300; text-decoration: none; position: relative; padding-bottom: 10px; }
        .step-link.active { color: #333333 !important; font-weight: 400; }
        .step-link.active::after { content: ''; position: absolute; left: 0; bottom: 0; width: 100%; height: 2px; background-color: #333333; }
    </style>
</head>
<body>

    <header class="border-bottom py-2">
        <nav class="navbar navbar-expand-lg navbar-light bg-white container">
            <div class="container-fluid d-flex justify-content-between">
                <a class="navbar-brand" href="index.html">
                    <img src="assets/logo.png" alt="Aotearoa Adventure Gear" height="40">
                </a>
                
                <div class="d-flex align-items-center">
                    <ul class="navbar-nav d-none d-lg-flex flex-row gap-3 me-4">
                        <li class="nav-item"><a class="nav-link text-muted" href="index.html">Home</a></li>
                        <li class="nav-item text-muted p-2">|</li>
                        <li class="nav-item"><a class="nav-link text-muted" href="about.html">About</a></li>
                        <li class="nav-item text-muted p-2">|</li>
                        <li class="nav-item"><a class="nav-link text-muted" href="shop.html">Shop</a></li>
                        <li class="nav-item text-muted p-2">|</li>
                        <li class="nav-item"><a class="nav-link text-muted" href="help.html">Help</a></li>
                    </ul>
                    <a href="cart.html" class="btn btn-dark">
                        Your Cart
                    </a>
                </div>
            </div>
        </nav>
    </header>

    <main class="container py-5">
        
        <section class="row border-bottom pb-3 mb-5 text-center g-2">
            <div class="col-4">
                <a href="cart.html" class="step-link d-inline-block">1. Shopping Cart</a>
            </div>
            <div class="col-4">
                <span class="step-link active d-inline-block">2. Shipping Details</span>
            </div>
            <div class="col-4">
                <span class="step-link d-inline-block">3. Payment Options</span>
            </div>
        </section>

        <div class="row g-5">
            
            <div class="col-lg-8">
                <h2 class="h4 fw-light text-dark mb-4 pb-2 border-bottom">Delivery Address</h2>
                
                <form id="shipping-form" class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label text-dark small fw-bold">First Name</label>
                        <input type="text" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-dark small fw-bold">Last Name</label>
                        <input type="text" class="form-control" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label text-dark small fw-bold">Street Address</label>
                        <input type="text" class="form-control" placeholder="e.g. 123 Rangitikei Street" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-dark small fw-bold">Suburb</label>
                        <input type="text" class="form-control" placeholder="e.g. Hokowhitu">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label text-dark small fw-bold">Town / City</label>
                        <input type="text" class="form-control" placeholder="e.g. Palmerston North" required>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label text-dark small fw-bold">Postcode</label>
                        <input type="text" class="form-control" placeholder="4410" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label text-dark small fw-bold">Phone Number</label>
                        <input type="tel" class="form-control" placeholder="021..." required>
                    </div>

                    <div class="col-12 d-flex gap-3 pt-4">
                        <button type="submit" class="btn btn-dark px-5 py-2">Next</button>
                        <a href="cart.html" class="btn btn-light border text-muted px-5 py-2">Back</a>
                    </div>
                </form>
            </div>

            <div class="col-lg-4">
                <div class="p-4 bg-light rounded border position-sticky" style="top: 20px;">
                    <h3 class="h5 text-dark fw-light mb-4 text-uppercase tracking-wide">Summary</h3>
                    
                    <!--PRODUCTS-->       
                    <div id="sidebar-items-container" class="mb-4 d-none d-md-block">
                     </div>
                    <!--COUPON DROP DOWN-->
                   <div class="mb-3 border-top pt-3">
                       <div class="d-flex justify-content-between align-items-center" 
                       data-bs-toggle="collapse" 
                       data-bs-target="#couponCollapse" 
                       style="cursor: pointer;">
                       <span class="text-dark fw-bold text-uppercase" style="font-size: 0.85rem;">Have A Voucher?</span>
                       <span class="text-dark lh-1" style="font-size: 1.1rem; padding-bottom: 2px;">&#9660;</span>
                    </div>

                    <div class="collapse" id="couponCollapse">
                         <div class="pt-2">
                    <div class="input-group input-group-sm">
                       <input type="text" class="form-control text-uppercase" placeholder="CODE">
                       <button class="btn btn-outline-dark" type="button">Apply</button>
                   </div>
                </div>
            </div>
        </div>
                   
                    <div class="d-flex justify-content-between mb-2 small">
                        <span class="text-muted">SUBTOTAL</span>
                        <span class="text-dark fw-bold" id="cart-subtotal">$0.00</span>
                    </div>
                    
                    <div class="d-flex justify-content-between mb-2 small">
                        <span class="text-muted">SHIPPING</span>
                        <span class="text-dark fw-bold text-uppercase" id="cart-shipping">$0.00</span>
                    </div>
                    
                    <div class="d-flex justify-content-between mb-3 small">
                        <span class="text-muted">TAXES (15% GST)</span>
                        <span class="text-dark fw-bold" id="cart-taxes">$0.00</span>
                    </div>
                    
                    <hr class="my-3">
                    
                    <div class="d-flex justify-content-between align-items-end pt-2">
                        <span class="h5 m-0 text-dark fw-light">TOTAL</span>
                        <span class="h4 m-0 text-dark fw-bold" id="cart-grand-total">$0.00</span>
                    </div>
                </div>
            </div>
            
        </div>
    </main>

    <footer class="border-top py-4 bg-white mt-5">
        <div class="container d-flex flex-column align-items-center text-center gap-2 text-muted small">
            <div class="d-flex gap-3 text-uppercase justify-content-center flex-wrap">
                <a href="index.html" class="text-muted text-decoration-none">Home</a> | 
                <a href="about.html" class="text-muted text-decoration-none">About</a> | 
                <a href="shop.html" class="text-muted text-decoration-none">Shop</a> | 
                <a href="help.html" class="text-muted text-decoration-none">Help</a>
            </div>
            <div class="mt-1">&copy; Aotearoa Adventure Gear</div>
        </div>
    </footer>

</body>
</html>
